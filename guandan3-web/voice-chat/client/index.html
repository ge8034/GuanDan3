<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关丹3 - 语音通话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .login-section {
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-success {
            background: #2ed573;
            color: white;
        }

        .btn-success:hover {
            background: #26af61;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .room-section {
            display: none;
        }

        .room-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .room-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .room-id {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            word-break: break-all;
        }

        .members-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .member-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .member-status {
            font-size: 12px;
            color: #666;
        }

        .member-status.online {
            color: #2ed573;
        }

        .member-status.muted {
            color: #ff4757;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn.mute {
            background: #2ed573;
            color: white;
        }

        .control-btn.mute.active {
            background: #ff4757;
        }

        .control-btn.end-call {
            background: #ff4757;
            color: white;
        }

        .control-btn.end-call:hover {
            background: #ff3838;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
        }

        .volume-control label {
            font-weight: 600;
            color: #333;
        }

        .volume-control input[type="range"] {
            width: 150px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-indicator.online {
            background: #2ed573;
        }

        .status-indicator.offline {
            background: #ff4757;
        }

        .hidden {
            display: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 4px solid #2ed573;
        }

        .notification.error {
            border-left: 4px solid #ff4757;
        }

        .notification.info {
            border-left: 4px solid #667eea;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
                height: 100vh;
            }

            .content {
                padding: 20px;
            }

            .members-list {
                grid-template-columns: 1fr;
            }

            .controls {
                gap: 10px;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 关丹3 语音通话</h1>
            <p>低延迟 P2P 语音通话系统</p>
        </div>

        <div class="content">
            <div class="login-section" id="loginSection">
                <div class="input-group">
                    <label for="userName">用户名</label>
                    <input type="text" id="userName" placeholder="请输入您的用户名" maxlength="20">
                </div>
                <div class="input-group">
                    <label for="roomId">房间ID（可选）</label>
                    <input type="text" id="roomId" placeholder="输入房间ID加入现有房间">
                </div>
                <button class="btn btn-primary" id="createRoomBtn">创建房间</button>
                <button class="btn btn-success" id="joinRoomBtn">加入房间</button>
            </div>

            <div class="room-section" id="roomSection">
                <div class="room-info">
                    <h3>房间信息</h3>
                    <p>房间ID: <span class="room-id" id="currentRoomId">-</span></p>
                    <p>在线人数: <span id="memberCount">0</span>/50</p>
                </div>

                <h3>在线成员</h3>
                <div class="members-list" id="membersList"></div>

                <div class="controls">
                    <button class="control-btn mute" id="muteBtn" title="静音/取消静音">
                        🎤
                    </button>
                    <div class="volume-control">
                        <label>音量</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    </div>
                    <button class="control-btn end-call" id="endCallBtn" title="结束通话">
                        📞
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class VoiceChatClient {
            constructor() {
                this.ws = null;
                this.localStream = null;
                this.peerConnections = new Map();
                this.remoteStreams = new Map();
                this.isMuted = false;
                this.volume = 0.8;
                this.userId = this.generateUserId();
                this.userName = '';
                this.roomId = null;
                this.members = new Map();

                this.iceServers = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                this.initEventListeners();
            }

            generateUserId() {
                return 'user_' + Math.random().toString(36).substr(2, 9);
            }

            initEventListeners() {
                document.getElementById('createRoomBtn').addEventListener('click', () => this.createRoom());
                document.getElementById('joinRoomBtn').addEventListener('click', () => this.joinRoom());
                document.getElementById('muteBtn').addEventListener('click', () => this.toggleMute());
                document.getElementById('endCallBtn').addEventListener('click', () => this.endCall());
                document.getElementById('volumeSlider').addEventListener('input', (e) => this.setVolume(e.target.value));
            }

            async connectToServer() {
                const wsUrl = `ws://${window.location.hostname}:8080`;
                this.ws = new WebSocket(wsUrl);

                return new Promise((resolve, reject) => {
                    this.ws.onopen = () => {
                        console.log('已连接到信令服务器');
                        this.setupMessageHandler();
                        resolve();
                    };

                    this.ws.onerror = (error) => {
                        console.error('WebSocket连接错误:', error);
                        this.showNotification('连接服务器失败', 'error');
                        reject(error);
                    };

                    this.ws.onclose = () => {
                        console.log('与服务器断开连接');
                        this.cleanup();
                    };
                });
            }

            setupMessageHandler() {
                this.ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    await this.handleMessage(data);
                };
            }

            async handleMessage(data) {
                switch (data.type) {
                    case 'room_created':
                        this.handleRoomCreated(data);
                        break;
                    case 'room_joined':
                        this.handleRoomJoined(data);
                        break;
                    case 'room_left':
                        this.handleRoomLeft();
                        break;
                    case 'user_joined':
                        await this.handleUserJoined(data);
                        break;
                    case 'user_left':
                        this.handleUserLeft(data);
                        break;
                    case 'offer':
                        await this.handleOffer(data);
                        break;
                    case 'answer':
                        await this.handleAnswer(data);
                        break;
                    case 'ice_candidate':
                        await this.handleIceCandidate(data);
                        break;
                    case 'user_muted':
                        this.handleUserMuted(data);
                        break;
                    case 'call_ended':
                        this.handleCallEnded(data);
                        break;
                    case 'error':
                        this.showError(data.message);
                        break;
                }
            }

            async createRoom() {
                this.userName = document.getElementById('userName').value.trim();
                if (!this.userName) {
                    this.showNotification('请输入用户名', 'error');
                    return;
                }

                try {
                    await this.connectToServer();
                    await this.getLocalStream();

                    this.ws.send(JSON.stringify({
                        type: 'create_room',
                        userId: this.userId,
                        userName: this.userName
                    }));
                } catch (error) {
                    this.showNotification('创建房间失败', 'error');
                }
            }

            async joinRoom() {
                this.userName = document.getElementById('userName').value.trim();
                const roomId = document.getElementById('roomId').value.trim();

                if (!this.userName) {
                    this.showNotification('请输入用户名', 'error');
                    return;
                }

                if (!roomId) {
                    this.showNotification('请输入房间ID', 'error');
                    return;
                }

                try {
                    await this.connectToServer();
                    await this.getLocalStream();

                    this.ws.send(JSON.stringify({
                        type: 'join_room',
                        roomId: roomId,
                        userId: this.userId,
                        userName: this.userName
                    }));
                } catch (error) {
                    this.showNotification('加入房间失败', 'error');
                }
            }

            async getLocalStream() {
                try {
                    this.localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                            sampleRate: 48000
                        }
                    });
                    console.log('获取本地音频流成功');
                } catch (error) {
                    console.error('获取音频流失败:', error);
                    throw new Error('无法访问麦克风');
                }
            }

            handleRoomCreated(data) {
                this.roomId = data.roomId;
                this.members = new Map(data.members.map(m => [m.userId, m]));
                this.showRoomSection();
                this.updateMembersList();
                this.showNotification('房间创建成功', 'success');
            }

            handleRoomJoined(data) {
                this.roomId = data.roomId;
                this.members = new Map(data.members.map(m => [m.userId, m]));
                this.showRoomSection();
                this.updateMembersList();
                this.showNotification('成功加入房间', 'success');
            }

            handleRoomLeft() {
                this.showLoginSection();
                this.showNotification('已离开房间', 'info');
            }

            async handleUserJoined(data) {
                this.members.set(data.userId, {
                    userId: data.userId,
                    userName: data.userName,
                    isMuted: false,
                    joinedAt: Date.now()
                });
                this.updateMembersList();

                await this.createPeerConnection(data.userId, data.clientId);
            }

            handleUserLeft(data) {
                this.members.delete(data.userId);
                this.closePeerConnection(data.userId);
                this.updateMembersList();
            }

            async createPeerConnection(targetUserId, targetClientId) {
                const pc = new RTCPeerConnection(this.iceServers);

                this.localStream.getTracks().forEach(track => {
                    pc.addTrack(track, this.localStream);
                });

                pc.ontrack = (event) => {
                    this.handleRemoteTrack(targetUserId, event.streams[0]);
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.ws.send(JSON.stringify({
                            type: 'ice_candidate',
                            targetUserId: targetUserId,
                            candidate: event.candidate
                        }));
                    }
                };

                pc.onconnectionstatechange = () => {
                    console.log(`与 ${targetUserId} 的连接状态:`, pc.connectionState);
                };

                this.peerConnections.set(targetUserId, pc);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                this.ws.send(JSON.stringify({
                    type: 'offer',
                    targetUserId: targetUserId,
                    offer: offer
                }));
            }

            async handleOffer(data) {
                const pc = new RTCPeerConnection(this.iceServers);

                this.localStream.getTracks().forEach(track => {
                    pc.addTrack(track, this.localStream);
                });

                pc.ontrack = (event) => {
                    this.handleRemoteTrack(data.senderId, event.streams[0]);
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.ws.send(JSON.stringify({
                            type: 'ice_candidate',
                            targetUserId: data.senderId,
                            candidate: event.candidate
                        }));
                    }
                };

                this.peerConnections.set(data.senderId, pc);

                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                this.ws.send(JSON.stringify({
                    type: 'answer',
                    targetUserId: data.senderId,
                    answer: answer
                }));
            }

            async handleAnswer(data) {
                const pc = this.peerConnections.get(data.senderId);
                if (pc) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            }

            async handleIceCandidate(data) {
                const pc = this.peerConnections.get(data.senderId);
                if (pc) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            }

            handleRemoteTrack(userId, stream) {
                this.remoteStreams.set(userId, stream);
                const audioElement = new Audio();
                audioElement.srcObject = stream;
                audioElement.volume = this.volume;
                audioElement.play();
                console.log(`收到 ${userId} 的音频流`);
            }

            handleUserMuted(data) {
                const member = this.members.get(data.userId);
                if (member) {
                    member.isMuted = data.isMuted;
                    this.updateMembersList();
                }
            }

            handleCallEnded(data) {
                this.showNotification(`${data.userId} 结束了通话`, 'info');
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.localStream.getAudioTracks().forEach(track => {
                    track.enabled = !this.isMuted;
                });

                const muteBtn = document.getElementById('muteBtn');
                muteBtn.classList.toggle('active', this.isMuted);
                muteBtn.textContent = this.isMuted ? '🔇' : '🎤';

                this.ws.send(JSON.stringify({
                    type: 'toggle_mute',
                    isMuted: this.isMuted
                }));

                this.showNotification(this.isMuted ? '已静音' : '已取消静音', 'info');
            }

            setVolume(value) {
                this.volume = value / 100;
                this.remoteStreams.forEach((stream, userId) => {
                    const audioElements = document.querySelectorAll(`audio[data-user-id="${userId}"]`);
                    audioElements.forEach(audio => {
                        audio.volume = this.volume;
                    });
                });
            }

            endCall() {
                this.ws.send(JSON.stringify({
                    type: 'end_call'
                }));
                this.cleanup();
                this.showLoginSection();
                this.showNotification('通话已结束', 'info');
            }

            showRoomSection() {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('roomSection').style.display = 'block';
                document.getElementById('currentRoomId').textContent = this.roomId;
            }

            showLoginSection() {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('roomSection').style.display = 'none';
            }

            updateMembersList() {
                const membersList = document.getElementById('membersList');
                const memberCount = document.getElementById('memberCount');
                
                memberCount.textContent = this.members.size;
                membersList.innerHTML = '';

                this.members.forEach(member => {
                    const card = document.createElement('div');
                    card.className = 'member-card';
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'member-avatar';
                    avatar.textContent = member.userName.charAt(0).toUpperCase();
                    
                    const info = document.createElement('div');
                    info.className = 'member-info';
                    
                    const name = document.createElement('div');
                    name.className = 'member-name';
                    name.textContent = member.userName;
                    
                    const status = document.createElement('div');
                    status.className = 'member-status';
                    
                    if (member.userId === this.userId) {
                        status.innerHTML = '<span class="status-indicator online"></span>我';
                    } else if (member.isMuted) {
                        status.innerHTML = '<span class="status-indicator offline"></span>已静音';
                    } else {
                        status.innerHTML = '<span class="status-indicator online"></span>在线';
                    }
                    
                    info.appendChild(name);
                    info.appendChild(status);
                    card.appendChild(avatar);
                    card.appendChild(info);
                    membersList.appendChild(card);
                });
            }

            closePeerConnection(userId) {
                const pc = this.peerConnections.get(userId);
                if (pc) {
                    pc.close();
                    this.peerConnections.delete(userId);
                }

                const stream = this.remoteStreams.get(userId);
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    this.remoteStreams.delete(userId);
                }
            }

            cleanup() {
                this.peerConnections.forEach((pc, userId) => {
                    pc.close();
                });
                this.peerConnections.clear();

                this.remoteStreams.forEach((stream, userId) => {
                    stream.getTracks().forEach(track => track.stop());
                });
                this.remoteStreams.clear();

                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }

                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }

                this.members.clear();
                this.roomId = null;
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.remove();
                }, 3000);
            }

            showError(message) {
                this.showNotification(message, 'error');
            }
        }

        const client = new VoiceChatClient();
    </script>
</body>
</html>
