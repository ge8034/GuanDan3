name: Database Migration

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations
        run: |
          supabase db diff --schema public --use-migra
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  test-migrations:
    name: Test Database Migrations
    runs-on: ubuntu-latest
    needs: migrate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Run migration tests
        run: |
          psql -h localhost -U postgres -d postgres -f supabase/tests/test_submit_turn_idempotency.sql
          psql -h localhost -U postgres -d postgres -f supabase/tests/test_rls_enforcement.sql

      - name: Stop local Supabase
        if: always()
        run: supabase stop
