name: Full Production Deployment

on:
  workflow_dispatch:
    inputs:
      skip_canary:
        description: 'Skip canary deployment'
        required: false
        default: false
        type: boolean
      backup_enabled:
        description: 'Enable backup before deployment'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'
  BASE_URL: 'https://guandan3.com'
  HEALTH_CHECK_URL: 'https://guandan3.com/health'

jobs:
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --run

      - name: Run E2E tests
        run: npm run test:e2e
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://guandan3.com
            https://guandan3.com/lobby
            https://guandan3.com/room
          uploadArtifacts: true
          temporaryPublicStorage: true

  full-deploy:
    name: Full Production Deployment
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Create backup
        if: ${{ github.event.inputs.backup_enabled != 'false' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "💾 创建备份..."
            BACKUP_DIR="/var/backups/guandan3-web/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            # 备份应用文件
            cp -r /var/www/guandan3-web/.next "$BACKUP_DIR/"
            cp -r /var/www/guandan3-web/public "$BACKUP_DIR/"
            cp /var/www/guandan3-web/package.json "$BACKUP_DIR/"
            cp /var/www/guandan3-web/ecosystem.config.js "$BACKUP_DIR/"
            
            echo "✅ 备份完成: $BACKUP_DIR"
            echo "$BACKUP_DIR" > /var/www/guandan3-web/.last_backup
            
            # 清理旧备份（保留最近7天）
            find /var/backups/guandan3-web -type d -mtime +7 -exec rm -rf {} \;

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /var/www/guandan3-web
          SOURCE: "./"
          EXCLUDE: "/node_modules/, /.git/, /.next/, /logs/, /.env.local"

      - name: Install dependencies on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/guandan3-web
            npm ci --production=false

      - name: Build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/guandan3-web
            npm run build

      - name: Update Nginx configuration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "⚙️ 更新Nginx配置..."
            
            # 设置100%流量到生产环境
            sudo sed -i 's/canary_percent [0-9]*/canary_percent 0/' /etc/nginx/sites-available/guandan3.com
            
            # 测试Nginx配置
            sudo nginx -t
            
            # 重载Nginx
            sudo systemctl reload nginx
            
            echo "✅ Nginx配置已更新"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/guandan3-web
            pm2 reload ecosystem.config.js --env production

      - name: Wait for application to be ready
        run: |
          echo "⏳ 等待应用启动..."
          sleep 30

      - name: Health check
        uses: jtalk/url-health-check-action@v3
        with:
          url: ${{ env.HEALTH_CHECK_URL }}
          max-attempts: 20
          retry-delay: 15s

      - name: Performance check
        run: |
          echo "⚡ 执行性能检查..."
          
          # 检查首页加载时间
          LOAD_TIME=$(curl -o /dev/null -s -w "%{time_total}" ${{ env.BASE_URL }}/)
          echo "首页加载时间: ${LOAD_TIME}s"
          
          # 检查TTFB
          TTFB=$(curl -o /dev/null -s -w "%{time_starttransfer}" ${{ env.BASE_URL }}/)
          echo "TTFB: ${TTFB}s"
          
          # 性能阈值检查
          if (( $(echo "$LOAD_TIME > 3.0" | bc -l) )); then
            echo "⚠️  页面加载时间超过阈值: ${LOAD_TIME}s > 3.0s"
          fi
          
          if (( $(echo "$TTFB > 1.0" | bc -l) )); then
            echo "⚠️  TTFB超过阈值: ${TTFB}s > 1.0s"
          fi

      - name: Verify critical functionality
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔍 验证关键功能..."
            
            # 检查首页
            if curl -f -s https://guandan3.com > /dev/null; then
              echo "✅ 首页访问正常"
            else
              echo "❌ 首页访问失败"
              exit 1
            fi
            
            # 检查大厅
            if curl -f -s https://guandan3.com/lobby > /dev/null; then
              echo "✅ 大厅访问正常"
            else
              echo "❌ 大厅访问失败"
              exit 1
            fi
            
            # 检查API
            if curl -f -s https://guandan3.com/api/health > /dev/null; then
              echo "✅ API访问正常"
            else
              echo "❌ API访问失败"
              exit 1
            fi

      - name: Run post-deployment verification
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/guandan3-web
            bash scripts/post-deploy-verification.sh

      - name: Mark current version as stable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/guandan3-web
            CURRENT_VERSION=$(git rev-parse HEAD)
            echo "$CURRENT_VERSION" > .last_production_version
            echo "✅ 当前版本已标记为生产版本: $CURRENT_VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Production Release v${{ github.run_number }}
          body: |
            ## Production Deployment
            
            - Full deployment to production
            - All pre-deployment checks passed
            - Health checks passed
            - Performance checks passed
            - Post-deployment verification passed
            - Backup created: ${{ github.event.inputs.backup_enabled }}
          draft: false
          prerelease: false

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: ${{ job.status }}
          text: '🎉 Full production deployment successful! Version v${{ github.run_number }} is now live on https://guandan3.com'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: ${{ job.status }}
          text: '❌ Full production deployment failed! Automatic rollback initiated.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Automatic rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔄 执行自动回滚..."
            
            if [ -f "/var/www/guandan3-web/.last_backup" ]; then
              BACKUP_DIR=$(cat /var/www/guandan3-web/.last_backup)
              echo "📦 从备份恢复: $BACKUP_DIR"
              
              # 恢复应用文件
              cp -r "$BACKUP_DIR/.next" /var/www/guandan3-web/
              cp -r "$BACKUP_DIR/public" /var/www/guandan3-web/
              cp "$BACKUP_DIR/package.json" /var/www/guandan3-web/
              cp "$BACKUP_DIR/ecosystem.config.js" /var/www/guandan3-web/
              
              # 重启PM2
              cd /var/www/guandan3-web
              pm2 reload ecosystem.config.js --env production
              
              # 健康检查
              if curl -f -s https://guandan3.com/health > /dev/null; then
                echo "✅ 回滚成功"
              else
                echo "❌ 回滚失败"
              fi
            else
              echo "⚠️  未找到备份文件"
            fi