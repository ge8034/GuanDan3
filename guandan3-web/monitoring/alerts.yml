# 监控告警配置
version: "1.0"

# 告警渠道配置
channels:
  - name: "slack-production"
    type: "slack"
    config:
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channel: "#production-alerts"
      username: "Guandan3 Monitor"
      icon_emoji: ":warning:"

  - name: "email-admin"
    type: "email"
    config:
      recipients:
        - "admin@example.com"
        - "devops@example.com"
      subject_prefix: "[Guandan3 Alert]"

  - name: "pagerduty"
    type: "pagerduty"
    config:
      service_key: "${PAGERDUTY_SERVICE_KEY}"
      escalation_policy: "default"

# 告警规则
rules:
  # 性能告警
  - name: "high_response_time"
    description: "API响应时间超过阈值"
    condition: "avg(api_response_time_seconds) > 1"
    duration: "5m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "API响应时间过高"
      description: "平均API响应时间超过1秒，持续5分钟"

  - name: "critical_response_time"
    description: "API响应时间严重超标"
    condition: "avg(api_response_time_seconds) > 3"
    duration: "2m"
    severity: "critical"
    channels:
      - "slack-production"
      - "pagerduty"
    annotations:
      summary: "API响应时间严重超标"
      description: "平均API响应时间超过3秒，持续2分钟"

  # 错误率告警
  - name: "high_error_rate"
    description: "API错误率过高"
    condition: "rate(http_requests_total{status=~\"5..\"}[5m]) / rate(http_requests_total[5m]) > 0.05"
    duration: "5m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "API错误率过高"
      description: "5xx错误率超过5%，持续5分钟"

  - name: "critical_error_rate"
    description: "API错误率严重超标"
    condition: "rate(http_requests_total{status=~\"5..\"}[5m]) / rate(http_requests_total[5m]) > 0.1"
    duration: "2m"
    severity: "critical"
    channels:
      - "slack-production"
      - "pagerduty"
    annotations:
      summary: "API错误率严重超标"
      description: "5xx错误率超过10%，持续2分钟"

  # 可用性告警
  - name: "service_down"
    description: "服务不可用"
    condition: "up == 0"
    duration: "1m"
    severity: "critical"
    channels:
      - "slack-production"
      - "pagerduty"
      - "email-admin"
    annotations:
      summary: "服务不可用"
      description: "服务监控端点不可达，持续1分钟"

  # 资源使用告警
  - name: "high_cpu_usage"
    description: "CPU使用率过高"
    condition: "avg(rate(process_cpu_seconds_total[5m])) * 100 > 80"
    duration: "10m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "CPU使用率过高"
      description: "CPU使用率超过80%，持续10分钟"

  - name: "high_memory_usage"
    description: "内存使用率过高"
    condition: "process_resident_memory_bytes / machine_memory_bytes * 100 > 85"
    duration: "10m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "内存使用率过高"
      description: "内存使用率超过85%，持续10分钟"

  # 数据库告警
  - name: "high_database_connections"
    description: "数据库连接数过高"
    condition: "pg_stat_database_numbackends > 50"
    duration: "5m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "数据库连接数过高"
      description: "数据库活动连接数超过50，持续5分钟"

  - name: "slow_database_queries"
    description: "数据库查询缓慢"
    condition: "rate(pg_stat_statements_mean_time_seconds[5m]) > 0.5"
    duration: "5m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "数据库查询缓慢"
      description: "平均查询时间超过500ms，持续5分钟"

  # 业务指标告警
  - name: "low_active_users"
    description: "活跃用户数过低"
    condition: "active_users < 1"
    duration: "1h"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "活跃用户数过低"
      description: "过去1小时内没有活跃用户"

  - name: "high_game_error_rate"
    description: "游戏错误率过高"
    condition: "rate(game_errors_total[5m]) / rate(game_actions_total[5m]) > 0.1"
    duration: "5m"
    severity: "warning"
    channels:
      - "slack-production"
    annotations:
      summary: "游戏错误率过高"
      description: "游戏操作错误率超过10%，持续5分钟"

# 告警抑制规则
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]

# 静默规则
silence_rules:
  - name: "maintenance_window"
    matchers:
      - name: "severity"
        value: "warning"
    starts_at: "2024-01-01T02:00:00Z"
    ends_at: "2024-01-01T04:00:00Z"
    comment: "计划维护窗口"

# 路由配置
route:
  group_by: ["alertname", "instance"]
  group_wait: "30s"
  group_interval: "5m"
  repeat_interval: "4h"
  receiver: "default-receiver"

  routes:
    - match:
        severity: "critical"
      receiver: "critical-receiver"
      group_wait: "10s"
      group_interval: "2m"
      repeat_interval: "1h"

    - match:
        alertname: "service_down"
      receiver: "pagerduty"
      group_wait: "0s"

# 接收器配置
receivers:
  - name: "default-receiver"
    slack_configs:
      - channel: "#alerts"
        send_resolved: true

  - name: "critical-receiver"
    slack_configs:
      - channel: "#critical-alerts"
        send_resolved: true
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"

  - name: "pagerduty"
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"
        severity: "critical"