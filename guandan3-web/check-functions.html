<!DOCTYPE html>
<html>
<head>
    <title>检查数据库函数</title>
</head>
<body>
    <h2>检查数据库函数状态</h2>
    <button onclick="checkFunctions()">检查函数</button>
    <div id="result"></div>

    <script>
        async function checkFunctions() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔍 检查中...';

            const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6enl3bHR4bGZndWNuZ2Zpem54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNTM1NjksImV4cCI6MjA4NDYyOTU2OX0.Upn1XmBZPQxYPl2UAVpGOtWim3Pf3yeeGNNMQm0idtM';

            try {
                // 检查可用的RPC函数
                const response = await fetch('https://rzzywltxlfgucngfiznx.supabase.co/rest/v1/rpc/', {
                    method: 'GET',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': 'Bearer ' + apiKey
                    }
                });

                const text = await response.text();
                console.log('RPC响应:', text);

                // 尝试不同的函数名
                const testFunctions = [
                    'setup_test_endgame',
                    'start_game',
                    'submit_turn'
                ];

                let results = '<h3>函数检查结果:</h3>';

                for (const funcName of testFunctions) {
                    try {
                        const testResponse = await fetch(`https://rzzywltxlfgucngfiznx.supabase.co/rest/v1/rpc/${funcName}`, {
                            method: 'POST',
                            headers: {
                                'apikey': apiKey,
                                'Authorization': 'Bearer ' + apiKey,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({})
                        });

                        const exists = testResponse.status !== 404 && !testResponse.statusText.includes('not found');
                        results += `<div>${funcName}: ${exists ? '✅ 存在' : '❌ 不存在'}</div>`;

                        if (!exists && testResponse.status !== 404) {
                            const errorText = await testResponse.text();
                            console.log(`${funcName} 错误详情:`, errorText);
                        }
                    } catch (e) {
                        results += `<div>${funcName}: ❓ 检查失败</div>`;
                    }
                }

                resultDiv.innerHTML = results;

            } catch (error) {
                resultDiv.innerHTML = `❌ 检查失败: ${error.message}`;
            }
        }
    </script>
</body>
</html>
