name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

jobs:
  # 依赖漏洞扫描
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guandan3-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guandan3-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # 代码安全扫描
  code-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guandan3-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

      - name: Run TruffleHog for secrets scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: HEAD

  # 容器安全扫描（如果使用容器）
  container-scan:
    runs-on: ubuntu-latest
    if: false  # 暂时禁用，如果使用Docker再启用
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t guandan3-web:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'guandan3-web:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 基础设施安全扫描
  infrastructure-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for infrastructure configuration files
        id: check-infra
        run: |
          if [ -f "terraform/**" ] || [ -f "**/cloudformation.yml" ]; then
            echo "has_infra=true" >> $GITHUB_OUTPUT
          else
            echo "has_infra=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Checkov for IaC security
        if: steps.check-infra.outputs.has_infra == 'true'
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: terraform,cloudformation
          quiet: true
          soft-fail: true

  # 生成安全报告
  security-report:
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, container-scan, infrastructure-scan]
    steps:
      - name: Generate security report
        run: |
          echo "# Security Scan Report - $(date)" > security-report.md
          echo "" >> security-report.md
          echo "## Summary" >> security-report.md
          echo "- Dependency vulnerabilities: [查看结果](#dependency-scan)" >> security-report.md
          echo "- Code security issues: [查看结果](#code-scan)" >> security-report.md
          echo "- Container vulnerabilities: [查看结果](#container-scan)" >> security-report.md
          echo "- Infrastructure security: [查看结果](#infrastructure-scan)" >> security-report.md
          echo "" >> security-report.md
          echo "## Recommendations" >> security-report.md
          echo "1. 定期更新依赖包" >> security-report.md
          echo "2. 修复高优先级安全漏洞" >> security-report.md
          echo "3. 实施安全编码规范" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30