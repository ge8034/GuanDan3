name: CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-checks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: guandan3-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guandan3-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: web-coverage
          path: guandan3-web/coverage
          if-no-files-found: warn
          retention-days: 7

  web-e2e:
    if: >-
      ${{
        (
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            contains(github.event.pull_request.labels.*.name, 'run-e2e')
          )
        )
        && secrets.NEXT_PUBLIC_SUPABASE_URL
        && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY
      }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guandan3-web
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guandan3-web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report-e2e
          path: |
            guandan3-web/playwright-report
            guandan3-web/test-results
          if-no-files-found: warn
          retention-days: 7

  web-perf:
    if: >-
      ${{
        (
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            contains(github.event.pull_request.labels.*.name, 'run-perf')
          )
        )
        && secrets.NEXT_PUBLIC_SUPABASE_URL
        && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY
      }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guandan3-web
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guandan3-web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:perf
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report-perf
          path: |
            guandan3-web/playwright-report
            guandan3-web/test-results
          if-no-files-found: warn
          retention-days: 7
